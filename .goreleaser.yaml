version: 2
project_name: faultbrief
builds:
  - main: ./cmd/faultbrief
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
checksum:
  name_template: checksums.txt
changelog:
  use: github-native
